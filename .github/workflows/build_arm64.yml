name: Build and Push Monerod Distroless ARM64

on:
  workflow_dispatch:
    inputs:
      monero_version:
        description: Official Core Monero Binary Version to pack (e.g., v0.18.5.0)
        required: true
        default: v0.18.5.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-distroless:
    name: Package Distroless Image
    runs-on: ubuntu-24.04-arm
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.monero_version }}
            type=raw,value=latest

      - name: Build and push Distroless Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.arm64
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          build-args: |
            MONERO_VERSION=${{ github.event.inputs.monero_version }}
